<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Acadêmica Web</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <header>
      <h1>Agenda acadêmica Web</h1>
    </header>

    <main>

      <section class="formulario">
        <form id="FormEvento">
          <label for="titulo">Título:</label>
          <input
            type="text"
            id="titulo"
            placeholder="Digite o título do evento"
            required
            minlength="5"
            maxlength="50"
          />

          <label for="categoria">Categoria:</label>
          <select id="categoria" required>
            <option value="">Selecione...</option>
            <option value="Palestra">Palestra</option>
            <option value="Minicurso">Minicurso</option>
            <option value="Oficina">Oficina</option>
            <option value="Seminario">Seminário</option>
            <option value="outro">Outro</option>
          </select>

          <label for="data">Data:</label>
          <input type="date" id="data" required />

          <label for="local">Local:</label>
          <input
            type="text"
            id="local"
            placeholder="Digite o local do evento"
            required
            minlength="3"
            maxlength="50"
          />

          <label for="vagas">Vagas:</label>
          <input
            type="number"
            id="vagas"
            placeholder="Digite o número de vagas"
            required
            min="1"
            max="500"
          />

          <label for="descricao">Descrição:</label>
          <textarea
        
            id="descricao"
            placeholder="Digite a descrição do evento"
            required
            minlength="10"
            maxlength="200"
          ></textarea>

          <button type="submit" id="cadastro_eventos">Adicionar Evento</button>
        </form>
      </section>

      <section class="pesquisa">
        <label for="inputPesquisa">Pesquisar por nome:</label>
        <input type="text" id="inputPesquisa" placeholder="Digite..." />
        <button id="btnPesquisar">Pesquisar</button>

        <label for="filtroCategoria">Filtrar por Categoria:</label>
        <select id="filtroCategoria">
          <option value="">Todas</option>
          <option value="Palestra">Palestra</option>
          <option value="Minicurso">Minicurso</option>
          <option value="Oficina">Oficina</option>
          <option value="Seminario">Seminário</option>
          <option value="outro">Outro</option>
        </select>
      </section>

      <section class="listagem">
        <h2>Eventos</h2>

        <div id="listaEventos"></div>
      </section>
    </main>

    <script src="JS/main.js"></script>
    <footer>
      <p>Agenda acadêmica Web © 2026</p>
    </footer>
  </body>
</html>
